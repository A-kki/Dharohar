version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: dharohar-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: dharohar-backend-app
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/dharohar
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo-data:
